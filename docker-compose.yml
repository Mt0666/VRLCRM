services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: vrlcrm-sql
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks:
      - vrlcrm

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrlcrm-web
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      Database__Server: db,1433
      Database__Name: VRLCRM
      Database__User: sa
      Database__Password: ${MSSQL_SA_PASSWORD}
      SeedData__AdminEmail: ${SeedData__AdminEmail:-admin@vrlcrm.local}
      SeedData__AdminPassword: ${SeedData__AdminPassword}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - stock-uploads:/app/wwwroot/uploads
      - dataprotection-keys:/app/dataprotection-keys
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - vrlcrm

  # Cloudflare Tunnel — docker compose --profile tunnel up -d
  # Zero Trust > Routes > Service URL: http://web:8080
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: vrlcrm-tunnel
    profiles: ["tunnel"]
    env_file:
      - .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vrlcrm

networks:
  vrlcrm:
    driver: bridge

volumes:
  sqldata:
  stock-uploads:
  dataprotection-keys:
